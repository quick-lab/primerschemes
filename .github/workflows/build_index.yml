name: Build index

# Controls when the action will run. Triggers the workflow on push or pull request 
# events but only for the master branch
on:
  push:
    branches: ['main']
    paths:
      - ".github/workflows/build_index.yml"
      - "primerschemes/**"
      - "index.json"
  
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: "pip"

    - name: Run the build index script
      run: pip install primal-page && primal-page build-index --gitserver ${{github.server_url}} --gitaccount ${{github.repository}} --git-commit-sha ${{github.sha}} --force

    - name: Commit and push if changed
      run: |
        if git diff --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        git config user.name "primer-bot"
        git config user.email "primer-bot@users.noreply.github.com"
        git add index.json
        git commit -m "Auto updating index"
        git push
